name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clothcrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clothcrm

      - name: Seed test database
        run: |
          python scripts/seed.py
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clothcrm

      - name: Run automated test suite
        run: |
          pytest -v tests/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clothcrm
          SECRET_KEY: testingsecretkey1234567890replaceinprod

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to DigitalOcean Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Stop old containers in the previous deployment directory if running
            if [ -d "/app/clothcrm" ]; then
                echo "=== Stopping old containers in /app/clothcrm ==="
                cd /app/clothcrm && docker compose -f docker-compose.prod.yml down || true
            fi

            # 2. Deploy and build in ~/networking
            cd ~/networking
            
            echo "=== Discarding any local modifications on the server ==="
            git reset --hard
            git clean -fd

            echo "=== Git Status before pull ==="
            git status
            echo "=== Latest Commit before pull ==="
            git log -n 1

            echo "=== Pulling latest changes ==="
            git pull origin main

            echo "=== Stopping current containers in ~/networking ==="
            docker compose -f docker-compose.prod.yml down || true

            echo "=== Building and starting new containers ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Running migrations ==="
            docker compose -f docker-compose.prod.yml exec -T web alembic upgrade head

            echo "=== Docker Containers Status ==="
            docker ps -a
