version: '3.8'

services:
  db:
    image: postgres:15
    container_name: clothcrm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clothcrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: clothcrm_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - SECRET_KEY=supersecretkeyreplaceinproduction1234567890
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clothcrm
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
